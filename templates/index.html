{% extends 'layouts/home_layout.html' %} {% block title %}House of Cards{%
endblock %} {% block content %}
<div class="non-game-container z-50">
    <h1 class="harry-potter title tracking-widest">
        H<span class="text-6xl">ɸ</span>u$e <span class="text-6xl">ɸ</span>f
        Card$
    </h1>
    <div class="flex flex-col gap-6 items-center justify-center">
        <a
            href="/play/pvp"
            class="button-link uppercase hover:opacity-75 lucida-bright text-3xl tracking-widest"
            >Play against Players</a
        >
        <a
            href="/play/pve"
            class="button-link uppercase hover:opacity-75 lucida-bright text-3xl tracking-widest"
            >Play against Bots</a
        >
        <a
            href="/simulate/configure"
            class="button-link uppercase hover:opacity-75 lucida-bright text-3xl tracking-widest"
            >Run Simulation</a
        >
        <a
            href="/how-to-play"
            class="button-link uppercase hover:opacity-75 lucida-bright text-3xl tracking-widest"
            >How to Play</a
        >
        <a
            href="/testing"
            class="button-link uppercase hover:opacity-75 lucida-bright text-3xl tracking-widest"
            >{TESTING_SIMULATION}</a
        >
    </div>
</div>

<img
    id="gryffindor"
    src="/static/icons/color_gryffindor.png"
    class="house-icon w-48 h-48 absolute"
/>

    class="house-icon w-48 h-48 absolute"
/>

    id="ravenclaw"

    class="house-icon w-48 h-48 absolute"
/>
