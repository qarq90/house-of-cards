{% extends 'layouts/home_layout.html' %} {% block title %}House of Cards | PvE{%
endblock %} {% block content %}
<div class="non-game-container">
    <h1 class="harry-potter title tracking-widest">
        P<span class="text-8xl">V</span>E
    </h1>

    <div
        class="flex flex-col gap-8 items-center justify-center max-w-2xl mx-auto mt-8"
    >
        <!-- Bot Selection Section -->
        <div class="flex flex-col gap-4 w-full">
            <h1
                class="lucida-bright uppercase text-3xl tracking-wider text-center"
            >
                Choose Your Opponent
            </h1>
            <div
                class="grid grid-cols-2 md:grid-cols-4 gap-4 justify-items-center"
            >
                <label class="bot-option cursor-pointer">
                    <input
                        type="radio"
                        name="bot"
                        value="crookshanks"
                        class="hidden"
                        checked
                    />
                    <div class="text-center">
                        <img
                            src="/static/icons/x_color_crookshanks.png"
                            class="bot-img p-2 w-32 h-32 hover:scale-105 transition-transform"
                        />
                        <span class="lucida-bright text-xl mt-2 block"
                            >Crookshanks</span
                        >
                    </div>
                </label>

                <label class="bot-option cursor-pointer">
                    <input
                        type="radio"
                        name="bot"
                        value="dobby"
                        class="hidden"
                    />
                    <div class="text-center">
                        <img
                            src="/static/icons/x_color_dobby.png"
                            class="bot-img p-2 w-32 h-32 hover:scale-105 transition-transform"
                        />
                        <span class="lucida-bright text-xl mt-2 block"
                            >Dobby</span
                        >
                    </div>
                </label>

                <label class="bot-option cursor-pointer">
                    <input
                        type="radio"
                        name="bot"
                        value="hedwig"
                        class="hidden"
                    />
                    <div class="text-center">
                        <img
                            src="/static/icons/x_color_hedwig.png"
                            class="bot-img p-2 w-32 h-32 hover:scale-105 transition-transform"
                        />
                        <span class="lucida-bright text-xl mt-2 block"
                            >Hedwig</span
                        >
                    </div>
                </label>

                <label class="bot-option cursor-pointer">
                    <input
                        type="radio"
                        name="bot"
                        value="trevor"
                        class="hidden"
                    />
                    <div class="text-center">
                        <img
                            src="/static/icons/x_color_trevor.png"
                            class="bot-img p-2 w-32 h-32 hover:scale-105 transition-transform"
                        />
                        <span class="lucida-bright text-xl mt-2 block"
                            >Trevor</span
                        >
                    </div>
                </label>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-4 w-full">
            <form
                method="POST"
                action="/play/pve/game"
                id="pveForm"
                class="w-full"
            >
                <input
                    type="hidden"
                    name="selectedBot"
                    id="selectedBotInput"
                    value="crookshanks"
                />
                <button
                    type="submit"
                    class="button-link text-3xl uppercase hover:opacity-75 lucida-bright tracking-widest w-full py-4"
                >
                    Start Game
                </button>
            </form>
            <a
                href="/play/pve"
                class="button-link text-3xl uppercase hover:opacity-75 lucida-bright tracking-widest w-full py-4 text-center"
            >
                Go Back
            </a>
        </div>
    </div>
</div>

<!-- Decorative Images -->
<img
    src="/static/icons/x_color_crookshanks.png"
    alt="x_color_crookshanks"
    class="absolute bottom-4 left-4 w-48 h-48 opacity-20"
/>
<img
    src="/static/icons/x_color_dobby.png"
    alt="x_color_dobby"
    class="absolute top-4 left-4 w-48 h-48 opacity-20"
/>
<img
    src="/static/icons/x_color_hedwig.png"
    alt="x_color_hedwig"
    class="absolute top-4 right-4 w-48 h-48 opacity-20"
/>
<img
    src="/static/icons/x_color_trevor.png"
    alt="x_color_trevor"
    class="absolute bottom-4 right-4 w-48 h-48 opacity-20"
/>

<!-- JavaScript for handling bot selection -->
<script>
    const botRadios = document.querySelectorAll('input[name="bot"]');
    const selectedBotInput = document.getElementById("selectedBotInput");
    const pveForm = document.getElementById("pveForm");

    // Update hidden input when bot is selected
    botRadios.forEach((radio) => {
        radio.addEventListener("change", function () {
            if (this.checked) {
                selectedBotInput.value = this.value;
            }
        });
    });

    // Optional: Add visual feedback for selected bot
    botRadios.forEach((radio) => {
        radio.addEventListener("change", function () {
            // Remove selected class from all bot options
            document.querySelectorAll(".bot-option").forEach((option) => {
                option.classList.remove("selected-bot");
            });
            // Add selected class to parent of checked radio
            if (this.checked) {
                this.closest(".bot-option").classList.add("selected-bot");
            }
        });
    });
</script>

<!-- Optional: Add some CSS for selected state -->
<style>
    .selected-bot .bot-img {
        border: 3px solid gold;
        border-radius: 50%;
        padding: 2px;
        box-shadow: 0 0 15px gold;
    }

    input[type="radio"]:checked + .text-center img {
        border: 3px solid gold;
        border-radius: 50%;
        padding: 2px;
        box-shadow: 0 0 15px gold;
    }

    .opacity-20 {
        opacity: 0.2;
    }
</style>
{% endblock %}
