{% extends 'layouts/home_layout.html' %} {% block title %}House of Cards | PvE |
2 Bots | Player Details{% endblock %} {% block content %}
<div class="non-game-container">
    <h1 class="harry-potter title tracking-widest">
        P<span class="text-8xl">V</span>E - 2 B<span class="text-7xl">ɸ</span>ts
        : (Triads)
    </h1>

    <form
        method="POST"
        action="/play/pve/2-bot/game"
        id="pveForm"
        enctype="multipart/form-data"
    >
        <div class="flex flex-col gap-16 items-center justify-center mt-8">
            <div class="flex flex-row gap-32 justify-center">
                <div class="flex flex-col gap-8 w-full max-w-2xl">
                    <div
                        class="flex flex-row gap-12 items-center justify-center mb-8"
                    >
                        <div class="flex flex-col items-center gap-4">
                            <div class="relative w-40 h-40">
                                <img
                                    id="avatarPreview"
                                    src="/static/icons/z_color_player.png"
                                    class="w-40 h-40 object-cover transition-all duration-300"
                                />

                                <label
                                    for="avatarUpload"
                                    class="absolute bottom-0 right-0 bg-white rounded-full p-2 cursor-pointer hover:bg-gray-200 transition-colors shadow-md"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        class="h-6 w-6 text-gray-800"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke="currentColor"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 0l-3 3m3-3l3 3"
                                        />
                                    </svg>
                                </label>

                                <input
                                    type="file"
                                    id="avatarUpload"
                                    accept="image/*"
                                    class="hidden"
                                />

                                <input
                                    type="hidden"
                                    name="avatar"
                                    id="avatarInputHidden"
                                />
                            </div>

                            <span class="lucida-bright text-lg"
                                >Upload Avatar</span
                            >
                        </div>

                        <div class="flex flex-col gap-3">
                            <label class="lucida-bright text-2xl">
                                Enter Your Name:
                            </label>

                            <input
                                type="text"
                                name="playerName"
                                id="playerName"
                                placeholder="Harry Potter"
                                required
                                class="p-4 text-xl rounded-lg bg-transparent lucida-bright border-2 border-white text-white placeholder-white placeholder-opacity-60 focus:outline-none"
                            />
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-row gap-8 items-center justify-center">
                <a
                    href="/play/pve"
                    class="button-link text-3xl uppercase lucida-bright tracking-widest py-4 px-8"
                >
                    Go Back
                </a>

                <button
                    type="submit"
                    class="button-link text-3xl uppercase lucida-bright tracking-widest py-4 px-8"
                >
                    Start Game
                </button>
            </div>
        </div>
    </form>
</div>

<script src="/static/scripts/player-config.js"></script>
{% endblock %}
